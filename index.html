<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Resume Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>

  <div class="container">
    <div class="form-section">
      <h2>Resume Builder</h2>
      <form id="resume-form">
        <label>Name: <input type="text" id="name" /></label>
        <label>Email: <input type="email" id="email" /></label>
        <label>Phone: <input type="tel" id="phone" /></label>
        <label>Profile Summary:
          <textarea id="summary"></textarea>
        </label>

        <div class="dynamic-section" id="education-section">
          <h3>Education</h3>
          <div class="edu-entry">
            <input type="text" placeholder="Degree, Year" class="education" />
          </div>
          <button type="button" onclick="addEducation()">+ Add Education</button>
        </div>

        <div class="dynamic-section" id="experience-section">
          <h3>Experience</h3>
          <div class="exp-entry">
            <input type="text" placeholder="Role, Company" class="experience" />
          </div>
          <button type="button" onclick="addExperience()">+ Add Experience</button>
        </div>

        <h3>Skills</h3>
        <div class="skills">
          <label><input type="checkbox" value="HTML" class="skill"> HTML</label>
          <label><input type="checkbox" value="CSS" class="skill"> CSS</label>
          <label><input type="checkbox" value="JavaScript" class="skill"> JavaScript</label>
          <label><input type="checkbox" value="React" class="skill"> React</label>
        </div>

        <div class="buttons">
          <button type="button" onclick="clearForm()">Clear</button>
          <button type="button" onclick="downloadPDF()">Download PDF</button>
        </div>
      </form>
    </div>

    <div class="resume-preview" id="resume-preview">
      <h2 id="preview-name"></h2>
      <p id="preview-email"></p>
      <p id="preview-phone"></p>
      <p id="preview-summary"></p>
      <h3>Education</h3>
      <ul id="preview-education"></ul>
      <h3>Experience</h3>
      <ul id="preview-experience"></ul>
      <h3>Skills</h3>
      <p id="preview-skills"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
